name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  server:
    name: server (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.22.x', '1.23.x']
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: server/go.sum
      - run: go vet ./...
      - run: go build -v ./...
      - name: Test (race, except Windows)
        if: runner.os != 'Windows'
        run: go test -count=1 -race -timeout 90s ./...
      - name: Test (no race on Windows)
        if: runner.os == 'Windows'
        run: go test -count=1 -timeout 90s ./...

  extension:
    name: extension (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run compile
      - name: Lint package.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
