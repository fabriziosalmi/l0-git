name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-binaries:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: server/go.sum
      - name: Build ${{ matrix.target }}
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w -X main.Version=${version}" \
            -o "../dist/lgit-${{ matrix.target }}${{ matrix.ext }}" .
      - name: Archive
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "lgit-${{ matrix.target }}.zip" "lgit-${{ matrix.target }}${{ matrix.ext }}"
          else
            tar -czf "lgit-${{ matrix.target }}.tar.gz" "lgit-${{ matrix.target }}${{ matrix.ext }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: lgit-${{ matrix.target }}
          path: |
            dist/lgit-${{ matrix.target }}.tar.gz
            dist/lgit-${{ matrix.target }}.zip
          if-no-files-found: ignore

  build-extension:
    name: vsix
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: server/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Cross-compile bundled binaries
        working-directory: extension
        run: ./scripts/build-bins.sh
      - name: Install extension deps
        working-directory: extension
        run: npm ci
      - name: Package vsix
        working-directory: extension
        run: |
          npx --yes @vscode/vsce package --out "l0-git-${GITHUB_REF_NAME#v}.vsix"
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: extension/*.vsix

  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-extension]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' \) -exec cp {} release/ \;
          ls -la release/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
